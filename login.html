<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background: #0b2a4a;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CENTER CARD */
.card {
    width: 500px;
    background: #f6e6ec;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 15px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #333;
}
</style>

</head>

<body>

<div class="card">

    <h2>Welcome</h2> <!-- ✅ CHANGED -->

    <form action="/welcome" method="POST">

        <input type="email" name="email" placeholder="Email" required>

        <!-- ✅ IMPORTANT FIX -->
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign In</button>

    </form>

</div>

</body>
</html>
